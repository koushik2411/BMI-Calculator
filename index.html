<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="box">
        <h2>BMI Calculator</h2>

        <div class="calc">
            <input type="number" placeholder="Height (in cm)" id="height" required>
            <input type="number" placeholder="Weight (in kg)" id="weight" required>
            <button id="calcBtn">Calculate BMI</button>
        </div>

        <div class="resDiv">
            <h4 id="result"></h4>
            <p id="resultCategory"></p>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
